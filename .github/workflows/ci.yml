name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests
        run: npm test
      - name: Syntax check JS modules
        run: |
          for f in $(git ls-files 'js/**/*.js' 'js/**/*.mjs' 'sw.js'); do
            node --check "$f"
          done
